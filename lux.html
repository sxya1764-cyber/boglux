<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บอกรักเธอหน่อย~</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Prompt', Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3);
            max-width: 500px;
            position: relative;
        }
        .heart {
            font-size: 90px;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 20px;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        h1 {
            color: #ff4d94;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #ff6b9d;
            font-size: 1.35rem;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .yes-btn {
            background: #ff4d94;
            color: white;
            padding: 18px 45px;
            font-size: 1.6rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 77, 148, 0.4);
            transition: all 0.3s;
        }
        .yes-btn:hover {
            transform: scale(1.1);
            background: #ff1e7a;
        }
        .no-btn {
            background: #888;
            color: white;
            padding: 18px 35px;
            font-size: 1.4rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .message {
            margin-top: 30px;
            animation: pop 0.6s;
        }
        .hidden {
            display: none;
        }
        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💕</div>
        <h1>เธอจะเป็นแฟนกันไหม?</h1>
        <p class="subtitle">ตอบมาเลยนะ ฉันรอคำตอบจากเธออยู่ 💖</p>

        <div class="buttons">
            <button id="yesBtn" class="yes-btn">ได้ครับเธอ 💕</button>
            <button id="noBtn" class="no-btn">ไม่ได้</button>
        </div>

        <div id="message" class="message hidden">
            <h2>❤️ ยินดีด้วย! เธอเป็นแฟนฉันแล้วนะ ❤️</h2>
            <p>ฉันรักเธอที่สุดเลย~ 💞</p>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const message = document.getElementById('message');

        // กดได้ครับเธอ
        yesBtn.addEventListener('click', () => {
            document.querySelector('.buttons').classList.add('hidden');
            message.classList.remove('hidden');
        });

        // ปุ่มไม่ได้ หนีไปเรื่อยๆ
        noBtn.addEventListener('mouseover', () => {
            const container = document.querySelector('.container');
            const maxX = window.innerWidth - 150;
            const maxY = window.innerHeight - 150;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });

        // ถ้ายังพยายามกด
        noBtn.addEventListener('click', () => {
            alert("😢 หนีไม่พ้นหรอกนะ 💕 ต้องกด 'ได้ครับเธอ' เท่านั้น");
        });
    </script>
</body>
</html>
